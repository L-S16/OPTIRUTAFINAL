name: optiruta
description: "Sistema Inteligente de Gestión y Optimización de Rutas"

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  firebase_storage: ^12.4.5

  # Estado
  provider: ^6.1.2

  # Mapas
  google_maps_flutter: ^2.5.3

  # GPS (VERSIÓN ESTABLE)
  geolocator: ^11.1.0

  # Imágenes
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo_optiruta.png

